<svg viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3fb950"/>
      <stop offset="100%" style="stop-color:#56d364"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots2" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#21262d"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="400" fill="url(#bg2)"/>
  <rect width="900" height="400" fill="url(#dots2)" opacity="0.8"/>

  <!-- Left decorative bar -->
  <rect x="0" y="0" width="4" height="400" fill="url(#accent2)"/>

  <!-- Top label -->
  <text x="24" y="38" fill="#3d444d" font-size="11" letter-spacing="2">// STAGE · 6 SEMAINES · 2026</text>

  <!-- Architecture diagram (right side) -->
  <!-- Layer labels -->
  <text x="490" y="80" fill="#3d444d" font-size="9" letter-spacing="2">ARCHITECTURE FULL-STACK</text>
  <line x1="490" y1="85" x2="870" y2="85" stroke="#21262d" stroke-width="0.5"/>

  <!-- Frontend layer -->
  <rect x="600" y="100" width="120" height="50" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="660" y="120" fill="#3fb950" font-size="10" text-anchor="middle" font-weight="bold">FRONTEND</text>
  <text x="660" y="135" fill="#3d444d" font-size="9" text-anchor="middle">HTML · CSS · JS</text>

  <!-- Arrow down -->
  <line x1="660" y1="150" x2="660" y2="168" stroke="#3d444d" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="655,168 665,168 660,175" fill="#3d444d"/>

  <!-- Backend layer -->
  <rect x="600" y="175" width="120" height="50" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="660" y="195" fill="#58a6ff" font-size="10" text-anchor="middle" font-weight="bold">BACKEND</text>
  <text x="660" y="210" fill="#3d444d" font-size="9" text-anchor="middle">PHP · API REST</text>

  <!-- Arrow down -->
  <line x1="660" y1="225" x2="660" y2="243" stroke="#3d444d" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="655,243 665,243 660,250" fill="#3d444d"/>

  <!-- BDD layer -->
  <rect x="600" y="250" width="120" height="50" rx="6" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="660" y="270" fill="#d29922" font-size="10" text-anchor="middle" font-weight="bold">BASE DE DONNÉES</text>
  <text x="660" y="285" fill="#3d444d" font-size="9" text-anchor="middle">MySQL · Modélisation</text>

  <!-- Deploy block -->
  <rect x="750" y="175" width="110" height="50" rx="6" fill="#161b22" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="805" y="195" fill="#bc8cff" font-size="10" text-anchor="middle" font-weight="bold">DÉPLOIEMENT</text>
  <text x="805" y="210" fill="#3d444d" font-size="9" text-anchor="middle">Linux · Apache</text>

  <!-- Connector -->
  <line x1="720" y1="200" x2="750" y2="200" stroke="#3d444d" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Doc block -->
  <rect x="490" y="175" width="100" height="50" rx="6" fill="#161b22" stroke="#f78166" stroke-width="1.5"/>
  <text x="540" y="195" fill="#f78166" font-size="10" text-anchor="middle" font-weight="bold">TESTS</text>
  <text x="540" y="210" fill="#3d444d" font-size="9" text-anchor="middle">Validation</text>

  <!-- Connector -->
  <line x1="600" y1="200" x2="590" y2="200" stroke="#3d444d" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Pipeline flow at bottom -->
  <rect x="490" y="315" width="380" height="30" rx="4" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="502" y="327" fill="#3d444d" font-size="8">PIPELINE</text>
  <!-- Steps -->
  <rect x="542" y="320" width="50" height="18" rx="3" fill="#1c2128"/>
  <text x="567" y="332" fill="#3fb950" font-size="8" text-anchor="middle">Modélise</text>
  <text x="597" y="332" fill="#3d444d" font-size="9">›</text>
  <rect x="604" y="320" width="50" height="18" rx="3" fill="#1c2128"/>
  <text x="629" y="332" fill="#58a6ff" font-size="8" text-anchor="middle">Développe</text>
  <text x="659" y="332" fill="#3d444d" font-size="9">›</text>
  <rect x="666" y="320" width="40" height="18" rx="3" fill="#1c2128"/>
  <text x="686" y="332" fill="#d29922" font-size="8" text-anchor="middle">Teste</text>
  <text x="711" y="332" fill="#3d444d" font-size="9">›</text>
  <rect x="718" y="320" width="50" height="18" rx="3" fill="#1c2128"/>
  <text x="743" y="332" fill="#bc8cff" font-size="8" text-anchor="middle">Déploie</text>
  <text x="773" y="332" fill="#3d444d" font-size="9">›</text>
  <rect x="780" y="320" width="50" height="18" rx="3" fill="#1c2128"/>
  <text x="805" y="332" fill="#f78166" font-size="8" text-anchor="middle">Documente</text>

  <!-- Left panel -->
  <text x="24" y="90" fill="#f0f6fc" font-size="34" font-weight="900" letter-spacing="-1">FULL-STACK</text>
  <text x="24" y="124" fill="#f0f6fc" font-size="34" font-weight="900" letter-spacing="-1">DEVELOPER</text>
  <rect x="24" y="138" width="100" height="3" fill="url(#accent2)"/>

  <text x="24" y="168" fill="#3d444d" font-size="12">Développeur Full-Stack · Stage</text>

  <!-- Badges -->
  <rect x="24" y="188" width="46" height="22" rx="11" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="47" y="203" fill="#58a6ff" font-size="10" text-anchor="middle">PHP</text>
  <rect x="76" y="188" width="42" height="22" rx="11" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="97" y="203" fill="#e6db74" font-size="10" text-anchor="middle">JS</text>
  <rect x="124" y="188" width="58" height="22" rx="11" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="153" y="203" fill="#f8d2a0" font-size="10" text-anchor="middle">MySQL</text>
  <rect x="24" y="216" width="50" height="22" rx="11" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="49" y="231" fill="#a8d5a2" font-size="10" text-anchor="middle">HTML</text>
  <rect x="80" y="216" width="38" height="22" rx="11" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="99" y="231" fill="#79c0ff" font-size="10" text-anchor="middle">CSS</text>

  <!-- Features -->
  <text x="24" y="272" fill="#3d444d" font-size="10" letter-spacing="1">RÉALISATIONS</text>
  <text x="24" y="294" fill="#3fb950" font-size="12">→</text>
  <text x="40" y="294" fill="#8b949e" font-size="12">Conception BDD complète</text>
  <text x="24" y="314" fill="#3fb950" font-size="12">→</text>
  <text x="40" y="314" fill="#8b949e" font-size="12">Tests &amp; validation</text>
  <text x="24" y="334" fill="#3fb950" font-size="12">→</text>
  <text x="40" y="334" fill="#8b949e" font-size="12">Déploiement &amp; doc</text>

  <text x="24" y="378" fill="#21262d" font-size="10">Mairie de Saint-Saulve · 2026</text>
  <text x="876" y="378" fill="#21262d" font-size="10" text-anchor="end">Stage 2 · 6 semaines</text>
</svg>
