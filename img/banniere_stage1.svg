  <rect x="480" y="94" width="80" height="246" fill="#0d1117" stroke="#21262d" stroke-width="0.5"/>
  <rect x="492" y="112" width="56" height="8" rx="2" fill="#21262d"/>
  <rect x="492" y="128" width="44" height="6" rx="2" fill="#1c2128"/>
  <rect x="492" y="142" width="50" height="6" rx="2" fill="#1c2128"/>
