  <rect x="480" y="108" width="80" height="22" fill="#1f6feb" opacity="0.2"/>
  <rect x="480" y="108" width="3" height="22" fill="#58a6ff"/>

  <!-- Main content area -->
  <!-- Dashboard header -->
