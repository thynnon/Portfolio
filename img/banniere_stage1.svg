  <text x="24" y="250" fill="#3d444d" font-size="10" letter-spacing="1">RÉALISATIONS</text>
  <text x="24" y="272" fill="#58a6ff" font-size="12">→</text>
  <text x="40" y="272" fill="#8b949e" font-size="12">Gestion des actualités</text>
  <text x="24" y="292" fill="#58a6ff" font-size="12">→</text>
  <text x="40" y="292" fill="#8b949e" font-size="12">Dashboard interactif</text>
  <text x="24" y="312" fill="#58a6ff" font-size="12">→</text>
  <text x="40" y="312" fill="#8b949e" font-size="12">Site dynamique</text>

  <!-- Bottom watermark -->
  <text x="24" y="378" fill="#21262d" font-size="10">Mairie de Saint-Saulve · 2025</text>
  <text x="876" y="378" fill="#21262d" font-size="10" text-anchor="end">Stage 1 · 4 semaines</text>
