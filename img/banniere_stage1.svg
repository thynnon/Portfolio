  <rect x="768" y="212" width="92" height="118" rx="4" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="778" y="228" fill="#3d444d" font-size="9">Activité</text>
  <polyline points="778,310 788,290 798,300 808,275 818,285 828,260 838,270 848,250" fill="none" stroke="#58a6ff" stroke-width="1.5" filter="url(#glow1)"/>
  <polyline points="778,310 788,290 798,300 808,275 818,285 828,260 838,270 848,250 848,320 778,320" fill="#1f6feb" opacity="0.15"/>

  <!-- Left panel content -->
  <!-- Title block -->
  <text x="24" y="90" fill="#f0f6fc" font-size="36" font-weight="900" letter-spacing="-1">INTRANET</text>
  <text x="24" y="118" fill="#f0f6fc" font-size="36" font-weight="900" letter-spacing="-1">MAIRIE</text>

