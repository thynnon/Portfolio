<svg viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#79c0ff"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid1" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21262d" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="400" fill="url(#bg1)"/>
  <rect width="900" height="400" fill="url(#grid1)" opacity="0.6"/>

  <!-- Left decorative bar -->
  <rect x="0" y="0" width="4" height="400" fill="url(#accent1)"/>

  <!-- Top code line -->
  <text x="24" y="38" fill="#3d444d" font-size="11" letter-spacing="2">// STAGE · 4 SEMAINES · 2025</text>

  <!-- Browser window mockup -->
  <rect x="480" y="60" width="380" height="280" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
