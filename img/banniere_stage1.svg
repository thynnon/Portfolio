  <rect x="592" y="279" width="90" height="5" rx="1" fill="#21262d"/>
  <rect x="592" y="287" width="60" height="4" rx="1" fill="#1c2128"/>
  <rect x="578" y="298" width="8" height="8" rx="1" fill="#1f6feb" opacity="0.2"/>
  <rect x="592" y="298" width="105" height="5" rx="1" fill="#21262d"/>
  <rect x="592" y="306" width="75" height="4" rx="1" fill="#1c2128"/>

