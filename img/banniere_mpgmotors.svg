  <radialGradient id="spot" cx="75%" cy="0%" r="60%">
    <stop offset="0%" style="stop-color:#f78166;stop-opacity:0.06"/>
    <stop offset="100%" style="stop-color:#0d1117;stop-opacity:0"/>
  </radialGradient>
  <rect width="900" height="400" fill="url(#spot)"/>

  <!-- Left bar -->
  <rect x="0" y="0" width="4" height="400" fill="url(#accent4)"/>

  <text x="24" y="38" fill="#3d444d" font-size="11" letter-spacing="2">// PROJET PERSONNEL · 2026</text>

  <!-- Car silhouette (right) -->
  <!-- Ground shadow -->
  <ellipse cx="680" cy="340" rx="180" ry="12" fill="#000" opacity="0.5"/>

