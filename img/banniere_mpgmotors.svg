  <text x="24" y="90" fill="#f0f6fc" font-size="42" font-weight="900" letter-spacing="-2">MPG</text>
  <text x="24" y="132" fill="#f0f6fc" font-size="42" font-weight="900" letter-spacing="-2">MOTORS</text>
